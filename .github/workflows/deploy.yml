name: Deploy to ArvanCloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload to ArvanCloud Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ARVAN_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ARVAN_SECRET_KEY }}
          AWS_REGION: ir-thr-at1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          aws s3 sync ./dist "s3://kio-preview" \
            --endpoint-url "https://s3.ir-thr-at1.arvanstorage.ir" \
            --acl public-read \
            --delete
