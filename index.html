<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#0c4f49" />

    <!-- Favicon (inline SVG "K" mark — no extra file needed) -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230c4f49'/%3E%3Ctext x='32' y='45' font-family='Arial,sans-serif' font-size='40' font-weight='bold' fill='white' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E"
    />

    <title>Kio — Neuroimaging Reporting &amp; Biomarker Platform</title>
    <meta
      name="description"
      content="Kio — an AI-assisted neuroimaging reporting and quantitative biomarker platform for cognitive-disorder MRI workflows. Role-based clinical prototype."
    />

    <!-- ============================================================= -->
    <!-- SOCIAL LINK PREVIEW (Open Graph + Twitter)                    -->
    <!-- TO UPDATE TOMORROW: when the domain changes, edit the URLs in -->
    <!-- og:url and og:image / twitter:image below (currently the      -->
    <!-- GitHub Pages address). Keep og:image an ABSOLUTE URL, and if  -->
    <!-- you replace og-image.png bump the ?v= number to bust caches.  -->
    <!-- ============================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kio" />
    <meta property="og:title" content="Kio — AI-assisted neuroimaging reporting & biomarkers" />
    <meta
      property="og:description"
      content="Role-based clinical workflow for cognitive-disorder MRI — from intake and AI analysis to specialist-reviewed release, with patient and caregiver portals."
    />
    <meta property="og:url" content="https://hamedkohan.github.io/kio/" />
    <meta property="og:image" content="https://hamedkohan.github.io/kio/og-image.png?v=1" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kio — AI-assisted neuroimaging reporting & quantitative biomarkers" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fa_IR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kio — AI-assisted neuroimaging reporting & biomarkers" />
    <meta
      name="twitter:description"
      content="Role-based clinical workflow for cognitive-disorder MRI — from intake and AI analysis to specialist-reviewed release."
    />
    <meta name="twitter:image" content="https://hamedkohan.github.io/kio/og-image.png?v=1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
